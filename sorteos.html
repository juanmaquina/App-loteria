<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <!-- PANTALLA LOTERÍAS -->
    <div id="pantalla-loterias">
      <h1 class="title">Lotería</h1>

      <div class="grid">
        <button class="btn">Provincia</button>
        <button class="btn">La Ciudad</button>
        <button class="btn">Cordoba</button>
        <button class="btn">Santa Fe</button>
        <button class="btn">Entre Rios</button>
        <button class="btn">Montevideo</button>
        <button class="btn">Volver</button>
      </div>

      <button class="btn siguiente">Siguiente</button>
    </div>

    <!-- PANTALLA TECLADO -->
     <div id="pantalla-teclado" class="hidden">
  <h1 class="title">Ingresar apuesta</h1>

  <div class="fila-apuesta">

  <input type="text" id="display" readonly placeholder="0000" />

  <select id="ubicacion">
    <option value="1">1°</option>
    <option value="2">2°</option>
    <option value="3">3°</option>
    <option value="4">4°</option>
    <option value="5">5°</option>
    <option value="10">10°</option>
    <option value="20">20°</option>
  </select>

  <input type="number" id="importe" placeholder="$" />

</div>
  <!-- TECLADO -->
  <div class="teclado">
    <button onclick="agregarNumero(1)">1</button>
    <button onclick="agregarNumero(2)">2</button>
    <button onclick="agregarNumero(3)">3</button>
    <button onclick="agregarNumero(4)">4</button>
    <button onclick="agregarNumero(5)">5</button> 
    <button onclick="agregarNumero(6)">6</button>
    <button onclick="agregarNumero(7)">7</button>
    <button onclick="agregarNumero(8)">8</button>
    <button onclick="agregarNumero(9)">9</button>
    <button onclick="borrar()">←</button>
    <button onclick="agregarNumero(0)">0</button>
    <button onclick="limpiar()">C</button>
  </div>

  <!-- BOTONES ACCIÓN -->
  <div class="acciones">

  <button class="btn accion quitar">Quite Apuesta</button>

  <button class="btn accion prox">Prox. Apuesta</button>

</div>

<button class="btn enviar-full">Enviar Apuesta</button>

  <!-- TABLA DE APUESTAS -->
  <table class="tabla">
    <thead>
      <tr>
        <th>Número</th>
        <th>Ubicación</th>
        <th>Importe</th>
      </tr>
    </thead>
    <tbody id="tabla-body"></tbody>
  </table>
<div class="total-container">
  Total: $<span id="total">0</span>
</div>
</div>
    <script src="app.js"></script>
</body>
</html>
